<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bilar</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1f2328;
      --muted: #59636e;
      --border: #d0d7de;
      --header: #f6f8fa;
      --panel: #f6f8fa;
      --link: #0969da;
      --active-bg: rgba(9, 105, 218, 0.08);
      --lower: #1a7f37;
      --medium: #9a6700;
      --higher: #bf8700;
      --avoid: #cf222e;
      --unrated: #6e7781;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #9da7b3;
        --border: #30363d;
        --header: #161b22;
        --panel: #161b22;
        --link: #58a6ff;
        --active-bg: rgba(88, 166, 255, 0.16);
        --lower: #3fb950;
        --medium: #d29922;
        --higher: #e3b341;
        --avoid: #f85149;
        --unrated: #8b949e;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 2200px;
      margin: 0 auto;
      padding: 32px clamp(18px, 2vw, 40px) 64px;
      display: flex;
      flex-direction: column;
    }
    h1, h2, h3 { line-height: 1.2; }
    h1 { margin: 0 0 8px; }
    h2 { margin-top: 32px; }
    p, li { max-width: 95ch; }
    a { color: var(--link); }
    .muted { color: var(--muted); }
    .panel {
      margin-top: 20px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .filters > div {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 6px;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }
    .filters > div.is-active {
      border-color: var(--link);
      background: var(--active-bg);
    }
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--fg);
      font: inherit;
    }
    button {
      cursor: pointer;
      width: auto;
      min-width: 140px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid currentColor;
    }
    .badge-lower { color: var(--lower); }
    .badge-medium { color: var(--medium); }
    .badge-higher { color: var(--higher); }
    .badge-avoid { color: var(--avoid); }
    .badge-unrated { color: var(--unrated); }
    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }
    .shortcut-grid,
    .car-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .shortcut-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .inventory-toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .tool-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .tool-card h3 {
      margin: 0;
      font-size: 1rem;
    }
    .view-toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .actions .view-toggle button {
      width: auto;
      min-width: 0;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
    }
    .actions .view-toggle button.active {
      border-color: var(--link);
      color: var(--link);
      font-weight: 700;
    }
    .shortcut-card,
    .mini-card,
    .car-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .shortcut-card {
      text-align: left;
      cursor: pointer;
    }
    .car-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .car-card h3 {
      margin: 0;
      font-size: 1.05rem;
    }
    .car-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }
    .car-meta div {
      min-width: 0;
    }
    .car-meta .label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2px;
    }
    .car-note {
      margin: 0;
    }
    .item-details {
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .item-details summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      user-select: none;
    }
    .field-groups {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .field-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: var(--panel);
    }
    .field-group h4 {
      margin: 0 0 8px;
      font-size: 0.9rem;
    }
    .field-list {
      margin: 0;
      display: grid;
      gap: 6px;
    }
    .field-row {
      display: grid;
      grid-template-columns: minmax(110px, 140px) minmax(0, 1fr);
      gap: 8px;
    }
    .field-row dt {
      color: var(--muted);
    }
    .field-row dd,
    .field-row dt {
      margin: 0;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    @media (min-width: 1400px) {
      .car-grid {
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      }
    }
    @media (min-width: 1800px) {
      .car-grid {
        grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
      }
      p, li {
        max-width: 110ch;
      }
    }
    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      font-size: 0.92rem;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
      white-space: normal;
    }
    th { background: var(--header); }
    #inventory-body.table-wrap thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    #inventory-body.table-wrap tbody tr:nth-child(even) {
      background: var(--panel);
    }
    #inventory-body.table-wrap tbody tr:hover {
      background: var(--header);
    }

    .inventory-only table td:nth-child(1) { min-width: 220px; }
    .inventory-only table th:nth-child(2),
    .inventory-only table td:nth-child(2) { min-width: 260px; }
    .inventory-only table th:nth-child(3),
    .inventory-only table td:nth-child(3) { min-width: 110px; }
    .inventory-only table th:nth-child(4),
    .inventory-only table td:nth-child(4) { min-width: 90px; }
    .inventory-only table th:nth-child(5),
    .inventory-only table td:nth-child(5) { min-width: 120px; }
    .inventory-only table th:nth-child(6),
    .inventory-only table td:nth-child(6) { min-width: 120px; }
    .inventory-only table th:nth-child(7),
    .inventory-only table td:nth-child(7) { min-width: 130px; }
    .inventory-only table th:nth-child(8),
    .inventory-only table td:nth-child(8) { min-width: 110px; }
    .inventory-only table th:nth-child(9),
    .inventory-only table td:nth-child(9) { min-width: 130px; }
    .inventory-only table th:nth-child(10),
    .inventory-only table td:nth-child(10) { min-width: 150px; }
    .inventory-only table th:nth-child(11),
    .inventory-only table td:nth-child(11) { min-width: 110px; }
    .inventory-only table th:nth-child(12),
    .inventory-only table td:nth-child(12) { min-width: 110px; }
    .inventory-only table th:nth-child(13),
    .inventory-only table td:nth-child(13) { min-width: 120px; }
    .inventory-only table th:nth-child(14),
    .inventory-only table td:nth-child(14) { min-width: 90px; }
    .inventory-only table th:nth-child(15),
    .inventory-only table td:nth-child(15) { min-width: 100px; }
    .inventory-only table th:nth-child(16),
    .inventory-only table td:nth-child(16) { min-width: 130px; }
    .inventory-only table th:nth-child(17),
    .inventory-only table td:nth-child(17) { min-width: 110px; }
    .inventory-only table th:nth-child(18),
    .inventory-only table td:nth-child(18) { min-width: 340px; }
    .inventory-only table th:nth-child(19),
    .inventory-only table td:nth-child(19) { min-width: 90px; }
    .inventory-only table td:nth-child(3),
    .inventory-only table td:nth-child(4),
    .inventory-only table td:nth-child(5),
    .inventory-only table td:nth-child(6),
    .inventory-only table td:nth-child(8),
    .inventory-only table td:nth-child(9),
    .inventory-only table td:nth-child(10),
    .inventory-only table td:nth-child(11),
    .inventory-only table td:nth-child(12),
    .inventory-only table td:nth-child(13),
    .inventory-only table td:nth-child(14),
    .inventory-only table td:nth-child(15),
    .inventory-only table td:nth-child(16),
    .inventory-only table td:nth-child(17),
    .inventory-only table td:nth-child(19) {
      white-space: nowrap;
    }
    ul.compact {
      margin: 0;
      padding-left: 18px;
    }
    .status {
      margin-top: 18px;
      min-height: 1.5em;
    }
    .page-shortlist .inventory-only {
      display: none;
    }
  </style>
</head>

  <script type="module" src="app.js"></script>
  <script type="application/json" id="legacy-inline-script-disabled">
    const DATA_URL = "data.json";
    const DEFAULT_MAX_PRICE = 50000;
    const pageMode = "inventory";
    let appData = null;
    let inventoryControlsBound = false;

    const elements = {
      heading: document.getElementById("page-heading"),
      intro: document.getElementById("page-intro"),
      serviceDisclaimer: document.getElementById("service-disclaimer"),
      bottomLineHeading: document.getElementById("bottom-line-heading"),
      bottomLineText: document.getElementById("bottom-line-text"),
      summaryCards: document.getElementById("summary-cards"),
      modelSpotCheck: document.getElementById("model-spot-check"),
      topModels: document.getElementById("top-models"),
      topLocations: document.getElementById("top-locations"),
      decisionRules: document.getElementById("decision-rules"),
      filterIntro: document.getElementById("inventory-filter-intro"),
      shortcutRoot: document.getElementById("shortcut-root"),
      viewCards: document.getElementById("view-cards"),
      viewList: document.getElementById("view-list"),
      status: document.getElementById("page-status"),
      brand: document.getElementById("brand"),
      model: document.getElementById("model"),
      location: document.getElementById("location"),
      search: document.getElementById("search"),
      maxPrice: document.getElementById("max-price"),
      maxMileage: document.getElementById("max-mileage"),
      fuel: document.getElementById("fuel"),
      seller: document.getElementById("seller"),
      body: document.getElementById("body"),
      risk: document.getElementById("risk"),
      unrated: document.getElementById("unrated"),
      sort1: document.getElementById("sort-1"),
      sort2: document.getElementById("sort-2"),
      sort3: document.getElementById("sort-3"),
      reset: document.getElementById("reset-filters"),
      resultsSummary: document.getElementById("results-summary"),
      filterState: document.getElementById("filter-state"),
      inventoryBody: document.getElementById("inventory-body"),
    };
    let inventoryView = "list";
    let sortLabelByValue = {};
    let modelOptionsByBrand = new Map();
    let allModelOptions = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function badgeClass(risk) {
      return `badge badge-${String(risk || "unrated").toLowerCase()}`;
    }

    function compareText(a, b, key, descending = false) {
      return descending
        ? String(b[key] ?? "").localeCompare(String(a[key] ?? ""))
        : String(a[key] ?? "").localeCompare(String(b[key] ?? ""));
    }

    function compareNumber(a, b, key, descending = false) {
      const aValue = Number(a[key] ?? 0);
      const bValue = Number(b[key] ?? 0);
      return descending ? bValue - aValue : aValue - bValue;
    }

    function riskRank(risk) {
      switch (String(risk || "").toLowerCase()) {
        case "lower":
          return 0;
        case "medium":
          return 1;
        case "higher":
          return 2;
        case "avoid":
          return 3;
        default:
          return null;
      }
    }

    function compareRisk(a, b, descending = false) {
      const aRank = riskRank(a.risk);
      const bRank = riskRank(b.risk);
      if (aRank === null && bRank === null) return 0;
      if (aRank === null) return 1;
      if (bRank === null) return -1;
      return descending ? bRank - aRank : aRank - bRank;
    }

    function serviceCostRank(value) {
      const match = String(value || "").match(/\d+(?:[.,]\d+)?\s*k?/i);
      if (!match) return Number.POSITIVE_INFINITY;
      const raw = match[0].toLowerCase().replace(",", ".");
      const numeric = parseFloat(raw);
      return Number.isNaN(numeric) ? Number.POSITIVE_INFINITY : numeric * (raw.includes("k") ? 1000 : 1);
    }

    function populateSelect(select, values, selectedValue = "All", includeAll = true) {
      const options = [];
      if (includeAll) {
        options.push('<option value="All">All</option>');
      }
      for (const value of values) {
        if (typeof value === "string") {
          options.push(`<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`);
        } else {
          options.push(`<option value="${escapeHtml(value.value)}">${escapeHtml(value.label)}</option>`);
        }
      }
      select.innerHTML = options.join("");
      select.value = selectedValue;
      if (!Array.from(select.options).some((option) => option.value === select.value)) {
        select.value = includeAll ? "All" : (select.options[0]?.value || "");
      }
    }

    function parseBrandModel(modelValue) {
      const clean = String(modelValue ?? "").trim();
      if (!clean) return { brand: "Unknown", modelName: "Unknown" };
      const [brand, ...rest] = clean.split(/\s+/);
      return {
        brand,
        modelName: rest.length ? rest.join(" ") : clean,
      };
    }

    function buildStructuredFilterCatalog() {
      const brands = new Set();
      const locations = new Set();
      modelOptionsByBrand = new Map();

      appData.inventory.forEach((item) => {
        const { brand, modelName } = parseBrandModel(item.model);
        item.brand = brand;
        item.modelName = modelName;
        brands.add(brand);
        locations.add(item.location);
        if (!modelOptionsByBrand.has(brand)) {
          modelOptionsByBrand.set(brand, new Set());
        }
        modelOptionsByBrand.get(brand).add(modelName);
      });

      const collator = new Intl.Collator("sv", { sensitivity: "base" });
      const brandOptions = [...brands].sort((a, b) => collator.compare(a, b));
      const locationOptions = [...locations].sort((a, b) => collator.compare(a, b));
      allModelOptions = [...new Set(appData.inventory.map((item) => item.modelName))].sort((a, b) => collator.compare(a, b));

      for (const [brand, modelSet] of modelOptionsByBrand.entries()) {
        modelOptionsByBrand.set(brand, [...modelSet].sort((a, b) => collator.compare(a, b)));
      }

      return { brandOptions, locationOptions };
    }

    function updateModelOptions(selectedBrand, selectedModel = "All") {
      const modelOptions = selectedBrand === "All" ? allModelOptions : (modelOptionsByBrand.get(selectedBrand) || []);
      populateSelect(elements.model, modelOptions, selectedModel, true);
    }

    function renderSummary(data) {
      const copy = data.copy;
      const inventoryPage = pageMode === "inventory";
      document.title = inventoryPage ? copy.inventoryTitle : copy.shortlistTitle;
      elements.heading.textContent = inventoryPage ? copy.inventoryTitle : copy.shortlistTitle;
      elements.intro.innerHTML = inventoryPage ? copy.inventoryIntroHtml : copy.shortlistIntroHtml;
      elements.serviceDisclaimer.textContent = copy.serviceDisclaimer;
      elements.bottomLineHeading.textContent = inventoryPage ? copy.inventoryBottomLineHeading : copy.shortlistBottomLineHeading;
      elements.bottomLineText.innerHTML = inventoryPage ? copy.inventoryBottomLineHtml : copy.shortlistBottomLineHtml;
      elements.summaryCards.innerHTML = (inventoryPage ? data.summary.inventoryCards : data.summary.shortlistCards)
        .map((card) => `<div class="summary-card"><strong>${escapeHtml(card.value)}</strong>${escapeHtml(card.label)}</div>`)
        .join("");
      elements.modelSpotCheck.innerHTML = data.summary.modelSpotCheck.map((item) => `<li>${escapeHtml(item.name)}: ${escapeHtml(item.count)}</li>`).join("");
      elements.topModels.innerHTML = data.summary.topModels.map((item) => `<li>${escapeHtml(item.name)}: ${escapeHtml(item.count)}</li>`).join("");
      elements.topLocations.innerHTML = data.summary.topLocations.map((item) => `<li>${escapeHtml(item.name)}: ${escapeHtml(item.count)}</li>`).join("");
      elements.decisionRules.innerHTML = data.summary.rules.map((rule) => `<li>${escapeHtml(rule)}</li>`).join("");
      elements.filterIntro.textContent = copy.inventoryFilterIntro;
    }

    function setFilters(values) {
      if (values.brand !== undefined) {
        elements.brand.value = values.brand;
        updateModelOptions(values.brand, values.model ?? "All");
      } else if (values.model !== undefined) {
        updateModelOptions(elements.brand.value, values.model);
      }
      if (values.location !== undefined) elements.location.value = values.location;
      if (values.search !== undefined) elements.search.value = values.search;
      if (values.maxPrice !== undefined) elements.maxPrice.value = values.maxPrice;
      if (values.maxMileage !== undefined) elements.maxMileage.value = values.maxMileage;
      if (values.fuel !== undefined) elements.fuel.value = values.fuel;
      if (values.seller !== undefined) elements.seller.value = values.seller;
      if (values.body !== undefined) elements.body.value = values.body;
      if (values.risk !== undefined) elements.risk.value = values.risk;
      if (values.unrated !== undefined) elements.unrated.value = values.unrated;
      if (values.sort1 !== undefined) elements.sort1.value = values.sort1;
      if (values.sort2 !== undefined) elements.sort2.value = values.sort2;
      if (values.sort3 !== undefined) elements.sort3.value = values.sort3;
      renderInventory();
    }

    function renderShortcuts() {
      const shortcuts = [
        { id: "prius", title: "Prius", note: "Best reliability-first bet.", values: { brand: "Toyota", model: "Prius", location: "All", search: "", maxPrice: "50000", maxMileage: "", fuel: "All", seller: "All", body: "All", risk: "All", unrated: "exclude", sort1: "price-asc", sort2: "none", sort3: "none" } },
        { id: "jazz", title: "Jazz", note: "Good CVT family pick.", values: { brand: "Honda", model: "Jazz", location: "All", search: "", maxPrice: "50000", maxMileage: "", fuel: "All", seller: "All", body: "All", risk: "All", unrated: "exclude", sort1: "price-asc", sort2: "none", sort3: "none" } },
        { id: "city", title: "Aygo / 107 / C1", note: "Small city-car cluster.", values: { brand: "All", model: "All", location: "All", search: "Aygo | 107 | C1", maxPrice: "50000", maxMileage: "", fuel: "All", seller: "All", body: "All", risk: "All", unrated: "exclude", sort1: "price-asc", sort2: "none", sort3: "none" } },
        { id: "avoid", title: "Avoid list", note: "Yaris/Auris/207/Polo warnings.", values: { brand: "All", model: "All", location: "All", search: "Yaris | Auris | 207 | Polo", maxPrice: "50000", maxMileage: "", fuel: "All", seller: "All", body: "All", risk: "Avoid", unrated: "exclude", sort1: "price-asc", sort2: "none", sort3: "none" } },
        { id: "lowmiles", title: "Low mileage", note: "Pull the easiest-looking cars first.", values: { brand: "All", model: "All", location: "All", search: "", maxPrice: "50000", maxMileage: 15000, fuel: "All", seller: "All", body: "All", risk: "All", unrated: "exclude", sort1: "mileage-asc", sort2: "none", sort3: "none" } },
        { id: "clear", title: "Reset", note: "Back to full inventory.", values: { brand: "All", model: "All", location: "All", search: "", maxPrice: "50000", maxMileage: "", fuel: "All", seller: "All", body: "All", risk: "All", unrated: "exclude", sort1: "none", sort2: "none", sort3: "none" } },
      ];
      elements.shortcutRoot.innerHTML = `<div class="shortcut-grid">${shortcuts
        .map(
          (shortcut) => `
          <button class="shortcut-card" type="button" data-shortcut="${shortcut.id}">
            <strong>${escapeHtml(shortcut.title)}</strong>
            <span class="muted">${escapeHtml(shortcut.note)}</span>
          </button>
        `,
        )
        .join("")}</div>`;
      elements.shortcutRoot.querySelectorAll("[data-shortcut]").forEach((button) => {
        const shortcut = shortcuts.find((item) => item.id === button.dataset.shortcut);
        button.addEventListener("click", () => setFilters(shortcut.values));
      });
    }

    function normalizeText(value) {
      return String(value ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function parseSearchQuery(query) {
      return normalizeText(query)
        .split("|")
        .map((group) => group.trim())
        .filter(Boolean)
        .map((group) => group.split(/\s+/).filter(Boolean));
    }

    function matchesSearch(item, tokenGroups) {
      if (!tokenGroups.length) return true;
      const haystack = [
        item.model,
        item.trim,
        item.location,
        item.fuel,
        item.gearbox,
        item.seller,
        item.body,
        item.reg,
        item.risk,
        item.riskNote,
        item.serviceDue,
        item.serviceCost,
        item.forumWatchouts,
      ].map(normalizeText).join(" ");
      return tokenGroups.some((tokens) => tokens.every((token) => haystack.includes(token)));
    }

    function parseOptionalNumber(value) {
      const trimmed = String(value ?? "").trim();
      if (!trimmed) return null;
      const parsed = Number(trimmed);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function getSortValues() {
      const selected = [elements.sort1.value, elements.sort2.value, elements.sort3.value];
      const deduped = [];
      const seen = new Set();
      for (const value of selected) {
        if (!value || value === "none" || seen.has(value)) continue;
        seen.add(value);
        deduped.push(value);
      }
      return deduped;
    }

    function describeActiveState(sortValues, tokenGroups, maxPrice, maxMileage) {
      const parts = [];
      if (elements.brand.value !== "All") parts.push(`brand: ${elements.brand.value}`);
      if (elements.model.value !== "All") parts.push(`model: ${elements.model.value}`);
      if (elements.location.value !== "All") parts.push(`location: ${elements.location.value}`);
      if (tokenGroups.length) parts.push(`search: ${elements.search.value.trim()}`);
      if (maxPrice !== null && maxPrice !== DEFAULT_MAX_PRICE) parts.push(`max price: ${Math.round(maxPrice)}`);
      if (maxMileage !== null) parts.push(`max mileage: ${Math.round(maxMileage)}`);
      if (elements.fuel.value !== "All") parts.push(`fuel: ${elements.fuel.value}`);
      if (elements.seller.value !== "All") parts.push(`seller: ${elements.seller.value}`);
      if (elements.body.value !== "All") parts.push(`body: ${elements.body.value}`);
      if (elements.risk.value !== "All") parts.push(`risk: ${elements.risk.value}`);
      if (elements.unrated.value === "include") parts.push("including unrated");
      if (sortValues.length) {
        const sortText = sortValues.map((value) => sortLabelByValue[value] || value).join(" > ");
        parts.push(`sort: ${sortText}`);
      }
      return parts.length ? `Active: ${parts.join(" • ")}` : "Active: default";
    }

    function compareField(a, b, sortValue) {
      switch (sortValue) {
        case "price-desc":
          return compareNumber(a, b, "priceNum", true);
        case "mileage-asc":
          return compareNumber(a, b, "mileageMil");
        case "mileage-desc":
          return compareNumber(a, b, "mileageMil", true);
        case "year-desc":
          return compareNumber(a, b, "yearNum", true);
        case "year-asc":
          return compareNumber(a, b, "yearNum");
        case "owners-asc":
          return compareNumber(a, b, "ownersNum");
        case "owners-desc":
          return compareNumber(a, b, "ownersNum", true);
        case "model-asc":
          return compareText(a, b, "model");
        case "model-desc":
          return compareText(a, b, "model", true);
        case "trim-asc":
          return compareText(a, b, "trim");
        case "trim-desc":
          return compareText(a, b, "trim", true);
        case "location-asc":
          return compareText(a, b, "location");
        case "location-desc":
          return compareText(a, b, "location", true);
        case "fuel-asc":
          return compareText(a, b, "fuel");
        case "fuel-desc":
          return compareText(a, b, "fuel", true);
        case "seller-asc":
          return compareText(a, b, "seller");
        case "seller-desc":
          return compareText(a, b, "seller", true);
        case "body-asc":
          return compareText(a, b, "body");
        case "body-desc":
          return compareText(a, b, "body", true);
        case "risk-asc":
        case "risk-best":
          return compareRisk(a, b, false);
        case "risk-desc":
        case "risk-worst":
          return compareRisk(a, b, true);
        case "service-due-asc":
          return compareText(a, b, "serviceDue");
        case "service-due-desc":
          return compareText(a, b, "serviceDue", true);
        case "service-cost-asc":
          return serviceCostRank(a.serviceCost) - serviceCostRank(b.serviceCost);
        case "service-cost-desc":
          return serviceCostRank(b.serviceCost) - serviceCostRank(a.serviceCost);
        case "reg-asc":
          return compareText(a, b, "reg");
        case "reg-desc":
          return compareText(a, b, "reg", true);
        case "price-asc":
          return compareNumber(a, b, "priceNum");
        case "none":
        default:
          return 0;
      }
    }

    function compareItems(a, b, sortValues) {
      for (const sortValue of sortValues) {
        const result = compareField(a, b, sortValue);
        if (Number.isFinite(result) && result !== 0) return result;
      }
      return a.priceNum - b.priceNum || a.model.localeCompare(b.model);
    }

    function renderInventoryRows(rows) {
      if (inventoryView === "cards") {
        elements.inventoryBody.className = "car-grid";
        elements.inventoryBody.innerHTML = rows.map((item) => `
          <article class="car-card">
            <div class="car-card-header">
              <div>
                <h3>${escapeHtml(item.model)}</h3>
                <div class="muted">${escapeHtml(item.trim)}</div>
              </div>
              <span class="${badgeClass(item.risk)}">${escapeHtml(item.risk)}</span>
            </div>
            <div class="car-meta">
              <div><span class="label">Year</span>${escapeHtml(item.year)}</div>
              <div><span class="label">Mileage</span>${escapeHtml(item.mileage)}</div>
              <div><span class="label">Price</span>${escapeHtml(item.price)}</div>
              <div><span class="label">Fuel</span>${escapeHtml(item.fuel)}</div>
              <div><span class="label">Location</span>${escapeHtml(item.location)}</div>
              <div><span class="label">Seller</span>${escapeHtml(item.seller)}</div>
              <div><span class="label">Body</span>${escapeHtml(item.body)}</div>
              <div><span class="label">Owners</span>${escapeHtml(item.owners)}</div>
              <div><span class="label">Reg</span>${escapeHtml(item.reg)}</div>
              <div><span class="label">Link</span><a href="${escapeHtml(item.href)}">Blocket</a></div>
            </div>
            <div><span class="label">Service due soon</span>${escapeHtml(item.serviceDue)}</div>
            <div><span class="label">Likely cost</span>${escapeHtml(item.serviceCost)}</div>
            <div><span class="label">Forum watchouts</span><p class="car-note">${escapeHtml(item.forumWatchouts)}</p></div>
            <div><span class="label">Why flagged this way</span><p class="car-note">${escapeHtml(item.riskNote)}</p></div>
          </article>
        `).join("");
        return;
      }

      elements.inventoryBody.className = "table-wrap";
      elements.inventoryBody.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Model</th>
              <th>Trim</th>
              <th>Risk</th>
              <th>Year</th>
              <th>Mileage</th>
              <th>Price</th>
              <th>Fuel</th>
              <th>Location</th>
              <th>Seller</th>
              <th>Body</th>
              <th>Owners</th>
              <th>Reg</th>
              <th>Service due soon</th>
              <th>Likely cost</th>
              <th>Forum watchouts</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((item) => `
              <tr>
                <td>${escapeHtml(item.model)}</td>
                <td>${escapeHtml(item.trim)}</td>
                <td><span class="${badgeClass(item.risk)}">${escapeHtml(item.risk)}</span></td>
                <td>${escapeHtml(item.year)}</td>
                <td>${escapeHtml(item.mileage)}</td>
                <td>${escapeHtml(item.price)}</td>
                <td>${escapeHtml(item.fuel)}</td>
                <td>${escapeHtml(item.location)}</td>
                <td>${escapeHtml(item.seller)}</td>
                <td>${escapeHtml(item.body)}</td>
                <td>${escapeHtml(item.owners)}</td>
                <td>${escapeHtml(item.reg)}</td>
                <td>${escapeHtml(item.serviceDue)}</td>
                <td>${escapeHtml(item.serviceCost)}</td>
                <td>${escapeHtml(item.forumWatchouts)}</td>
                <td><a href="${escapeHtml(item.href)}">Blocket</a></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderInventory() {
      const tokenGroups = parseSearchQuery(elements.search.value.trim());
      const maxPrice = parseOptionalNumber(elements.maxPrice.value);
      const maxMileage = parseOptionalNumber(elements.maxMileage.value);
      const sortValues = getSortValues();
      const includeUnrated = elements.unrated.value === "include" || elements.risk.value === "Unrated";
      const visibleInventory = includeUnrated ? appData.inventory : appData.inventory.filter((item) => item.risk !== "Unrated");
      const filtered = visibleInventory
        .filter((item) => elements.brand.value === "All" || item.brand === elements.brand.value)
        .filter((item) => elements.model.value === "All" || item.modelName === elements.model.value)
        .filter((item) => elements.location.value === "All" || item.location === elements.location.value)
        .filter((item) => matchesSearch(item, tokenGroups))
        .filter((item) => maxPrice === null || item.priceNum <= maxPrice)
        .filter((item) => maxMileage === null || item.mileageMil <= maxMileage)
        .filter((item) => elements.fuel.value === "All" || item.fuel === elements.fuel.value)
        .filter((item) => elements.seller.value === "All" || item.seller === elements.seller.value)
        .filter((item) => elements.body.value === "All" || item.body === elements.body.value)
        .filter((item) => elements.risk.value === "All" || item.risk === elements.risk.value)
        .sort((a, b) => compareItems(a, b, sortValues));

      renderInventoryRows(filtered);
      elements.resultsSummary.textContent = `${filtered.length} of ${visibleInventory.length} cars shown`;
      elements.filterState.textContent = describeActiveState(sortValues, tokenGroups, maxPrice, maxMileage);
      elements.viewCards.classList.toggle("active", inventoryView === "cards");
      elements.viewList.classList.toggle("active", inventoryView === "list");
    }

    function bindInventoryControls() {
      if (inventoryControlsBound) return;
      inventoryControlsBound = true;
      const listeners = [
        elements.model,
        elements.location,
        elements.search,
        elements.maxPrice,
        elements.maxMileage,
        elements.fuel,
        elements.seller,
        elements.body,
        elements.risk,
        elements.unrated,
        elements.sort1,
        elements.sort2,
        elements.sort3,
      ];
      listeners.forEach((control) => {
        control.addEventListener("input", renderInventory);
        control.addEventListener("change", renderInventory);
      });
      elements.brand.addEventListener("change", () => {
        updateModelOptions(elements.brand.value, "All");
        renderInventory();
      });
      elements.reset.addEventListener("click", () => {
        elements.brand.value = "All";
        updateModelOptions("All", "All");
        elements.location.value = "All";
        elements.search.value = "";
        elements.maxPrice.value = "50000";
        elements.maxMileage.value = "";
        elements.fuel.value = "All";
        elements.seller.value = "All";
        elements.body.value = "All";
        elements.risk.value = "All";
        elements.unrated.value = "exclude";
        elements.sort1.value = "none";
        elements.sort2.value = "none";
        elements.sort3.value = "none";
        renderInventory();
      });
      elements.viewCards.addEventListener("click", () => {
        inventoryView = "cards";
        renderInventory();
      });
      elements.viewList.addEventListener("click", () => {
        inventoryView = "list";
        renderInventory();
      });
    }

    async function loadData() {
      const response = await fetch(DATA_URL);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    async function init() {
      try {
        appData = await loadData();
        renderSummary(appData);
        renderShortcuts();

        if (pageMode === "inventory") {
          const { brandOptions, locationOptions } = buildStructuredFilterCatalog();
          populateSelect(elements.brand, brandOptions);
          populateSelect(elements.location, locationOptions);
          updateModelOptions("All", "All");
          populateSelect(elements.fuel, appData.filters.fuels);
          populateSelect(elements.seller, appData.filters.sellers);
          populateSelect(elements.body, appData.filters.bodies);
          populateSelect(elements.risk, appData.filters.risks);
          sortLabelByValue = Object.fromEntries(appData.filters.sortOptions.map((option) => [option.value, option.label]));
          populateSelect(elements.sort1, appData.filters.sortOptions, "none", false);
          populateSelect(elements.sort2, appData.filters.sortOptions, "none", false);
          populateSelect(elements.sort3, appData.filters.sortOptions, "none", false);
          bindInventoryControls();
          renderInventory();
        }

        elements.status.textContent = "";
      } catch (error) {
        elements.status.textContent = `Could not load the page data: ${error.message}`;
      }
    }

    init();
  </script>
</body>
</html>
